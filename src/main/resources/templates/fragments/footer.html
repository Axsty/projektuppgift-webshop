<footer th:fragment="footer">
    <hr>
    <a th:href="@{/privacy}">Integritetspolicy</a>
    <a th:href="@{/cookies}">Cookies</a>

    <div id="cookie-banner" style="
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: #333;
        color: white;
        padding: 15px;
        text-align: center;
    ">
        Denna webbplats använder cookies. Läs mer i vår
        <a th:href="@{/cookies}" style="color: #4da6ff; text-decoration: underline;">
            cookiepolicy
        </a>.

        <button onclick="acceptCookies()" style="margin-left: 10px;">
            OK
        </button>
    </div>

    <script>
        function acceptCookies() {
            localStorage.setItem("cookiesAccepted", "true");
            document.getElementById("cookie-banner").style.display = "none";
        }

        window.onload = function () {
            if (localStorage.getItem("cookiesAccepted") === "true") {
                document.getElementById("cookie-banner").style.display = "none";
            }
        }
    </script>

</footer>
