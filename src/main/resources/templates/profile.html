<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profil</title>
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<h1>Min profil</h1>

<p><strong>E-post:</strong></p>
<p th:text="${user.username}"></p>

<p><strong>Roll:</strong></p>
<p th:text="${user.role}"></p>

<p><strong>Samtycke:</strong></p>
<p th:text="${user.consent}"></p>

<h3>Hantera konto</h3>

<form method="post" th:action="@{/profile/send-info}">
    <button type="submit">Skicka mina uppgifter via mail</button>
</form>

<form method="post" th:action="@{/profile/delete}">
    <button type="submit">Radera konto</button>
</form>

<p th:if="${message}" th:text="${message}"></p>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
