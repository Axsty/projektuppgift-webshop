<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmation</title>
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<h1>Orderbekräftelse</h1>
<h2>Tack för din beställning!</h2>

<h3 th:text="'Hej ' + ${userDetails.username} + '!'"></h3>
<h3 th:text="'Datum: ' + ${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm:ss')}"></h3>

<h2>Produkter</h2>
<div th:each="item : ${order.orderItems}">
    <h3 th:text="${item.productName} + ' ' + 'x' + ${item.quantity} + ' ' + ${item.price} + 'kr'"></h3>
</div>

<h3 th:text="'Total belopp: ' + ${order.price} + 'kr'"></h3>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
